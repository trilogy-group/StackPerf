name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-secrets:
    name: Detect Secrets
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan \
            --exclude-files "uv.lock" \
            --exclude-files ".*\.lock$" \
            --exclude-files ".*\.log$" \
            --exclude-files ".*\.md$" \
            --exclude-files ".*\.txt$" \
            --exclude-files ".*\.json$" \
            --exclude-files ".*\.yaml$" \
            --exclude-files ".*\.yml$" \
            --exclude-files "tests/.*" \
            --baseline .secrets.baseline \
            > /tmp/secrets-results.json || true

      - name: Check for new secrets
        run: |
          # Check if baseline exists
          if [ -f ".secrets.baseline" ]; then
            # Compare scan against baseline
            detect-secrets audit --report --fail-on-unaudited .secrets.baseline
          else
            echo "No baseline found. Scanning for any detected secrets..."
            # If any secrets detected (excluding allowed patterns), fail
            if [ -s /tmp/secrets-results.json ]; then
              count=$(jq -r '.results | length' /tmp/secrets-results.json 2>/dev/null || echo "0")
              if [ "$count" -gt 0 ]; then
                echo "::error::Potential secrets detected in the repository"
                jq -r '.results | keys[]' /tmp/secrets-results.json | while read -r file; do
                  echo "::error::Secret detected in: $file"
                done
                exit 1
              fi
            fi
          fi
          echo "✓ No new secrets detected"

  check-env-files:
    name: Check Environment Files
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for committed .env files
        run: |
          # Look for .env files that shouldn't be committed
          env_files=$(find . -type f -name ".env*" ! -path "./.git/*" ! -path "./.venv/*" ! -name ".env.example" 2>/dev/null || true)
          if [ -n "$env_files" ]; then
            echo "::error::Found committed .env files (excluding .env.example):"
            echo "$env_files"
            exit 1
          fi
          echo "✓ No committed .env files found"

      - name: Check for hardcoded secrets in source
        run: |
          # Check for common secret patterns that shouldn't be in source
          patterns=(
            "sk-[a-zA-Z0-9]{20,}"  # OpenAI API key format
            "sk-ant-[a-zA-Z0-9]{20,}"  # Anthropic API key format
            "AKIA[0-9A-Z]{16}"  # AWS Access Key ID
            "[0-9a-f]{32}"  # Common 32-char hex secrets
          )
          
          found=0
          for pattern in "${patterns[@]}"; do
            matches=$(grep -r -E "$pattern" --include="*.py" src/ 2>/dev/null | grep -v "test_" | grep -v "example" | grep -v "REDACTED" | grep -v "fake" | grep -v "example" | head -5 || true)
            if [ -n "$matches" ]; then
              echo "::error::Potential hardcoded secret pattern detected:"
              echo "$matches"
              found=1
            fi
          done
          
          if [ "$found" -eq 1 ]; then
            exit 1
          fi
          echo "✓ No hardcoded secrets detected in source code"
