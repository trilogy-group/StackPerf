# StackPerf CI Pipeline
# Runs quality gates on all PRs and main branch pushes

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          
      - name: Sync dependencies
        run: uv sync --all-extras
        
      - name: Run linter
        run: uv run ruff check src/ tests/
        
      - name: Check formatting
        run: uv run ruff format --check src/ tests/
        
      - name: Run type checker
        run: uv run mypy src/
        
      - name: Run tests
        run: uv run pytest tests/ -v
        
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: success()
        with:
          directory: ./coverage
          fail_ci_if_error: false
          files: ./coverage.xml

  config-validation:
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Sync dependencies
        run: uv sync --all-extras
        
      - name: Validate configs
        run: uv run stackperf validate --all-configs
        continue-on-error: true
        
  migration-smoke:
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: stackperf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Sync dependencies
        run: uv sync --all-extras
        
      - name: Run migration smoke test
        run: uv run pytest tests/integration/test_migrations.py -v
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/stackperf_test
        continue-on-error: true
