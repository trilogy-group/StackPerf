name: fireworks-openai
route_name: fireworks-main
protocol_surface: openai_responses
upstream_base_url_env: FIREWORKS_BASE_URL
api_key_env: FIREWORKS_API_KEY
models:
  - alias: kimi-k2-5
    upstream_model: accounts/fireworks/models/kimi-k2p5
  - alias: kimi-k2-5-turbo
    upstream_model: accounts/fireworks/routers/kimi-k2p5-turbo
  - alias: glm-5
    upstream_model: accounts/fireworks/models/glm-5
  - alias: glm-5-fast
    upstream_model: accounts/fireworks/routers/glm-5-fast
routing_defaults:
  timeout_seconds: 180
  extra_headers:
    x-session-affinity: "{{ session_affinity_key }}"
