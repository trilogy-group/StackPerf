profiles:
  - name: platform-team-default
    description: Default usage policy for platform team with moderate budgets
    allowed_models:
      - kimi-k2-5
      - glm-5
      - gpt-4o
    budget_duration: 30d
    budget_amount: 1000.0
    ttl_seconds: 2592000
    owner: platform-team
    team: platform
    customer: internal
    metadata:
      cost_center: engineering
      environment: production
    redaction_policy:
      policy_name: default-redaction
      retain_prompts: false
      retain_responses: false
      retention_days: 30

  - name: data-science-team
