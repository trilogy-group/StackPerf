    budget_amount: 5000.0
    ttl_seconds: 7776000
    owner: ds-team
    team: data-science
    customer: research
    metadata:
      cost_center: research
      environment: staging
    redaction_policy:
      policy_name: research-redaction
      retain_prompts: false
      retain_responses: false
      retention_days: 90
