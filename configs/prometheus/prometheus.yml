global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'stackperf-local'

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          environment: 'local'

  - job_name: 'litellm'
    static_configs:
      - targets: ['litellm:4000']
        labels:
          environment: 'local'
          service: 'litellm-proxy'
    metrics_path: '/metrics'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
        labels:
          environment: 'local'
          service: 'postgres'
